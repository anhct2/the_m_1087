version: '3.8'

# Deploy:  docker-compose -f docker-compose.dahua.yml up -d --build
# Logs:    docker-compose -f docker-compose.dahua.yml logs -f
# Restart: docker-compose -f docker-compose.dahua.yml restart worker-dahua

services:
  worker-dahua:
    build:
      context: .
      dockerfile: Dockerfile
    image: worker-dahua:latest
    container_name: worker-dahua
    restart: unless-stopped

    # network_mode: host → truy cập NVR trực tiếp qua LAN 192.168.x.x
    # (không cần expose port)
    network_mode: host

    env_file:
      - .env

    volumes:
      - /mnt/nvr/m1087/videos:/mnt/nvr/m1087/videos
      - /mnt/nvr/m1087/dav:/mnt/nvr/m1087/dav

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

    # Healthcheck: process vẫn đang chạy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
