name: Deploy to VPS

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }} to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            TAG="${{ github.ref_name }}"
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"

            echo "════════════════════════════════════════"
            echo "  Deploy: $TAG"
            echo "  Path  : $DEPLOY_PATH"
            echo "  Time  : $(date '+%Y-%m-%d %H:%M:%S %Z')"
            echo "════════════════════════════════════════"

            cd "$DEPLOY_PATH"

            echo ""
            echo "▶ [1/4] Fetch & checkout $TAG ..."
            git fetch --tags --force
            git checkout "$TAG"
            echo "  Commit: $(git log -1 --format='%h %s (%an, %ar)')"

            echo ""
            echo "▶ [2/4] Pull images & build ..."
            docker compose pull --ignore-buildable
            docker compose up -d --build --remove-orphans
            echo "  Build done."

            echo ""
            echo "▶ [3/4] Health check (15s) ..."
            sleep 15
            docker compose ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "▶ [4/4] Recent logs (tail 30) ..."
            docker compose logs --tail=30 --no-log-prefix 2>&1 | sed 's/^/  /'

            echo ""
            echo "════════════════════════════════════════"
            echo "  ✅ Deploy $TAG thành công!"
            echo "════════════════════════════════════════"

      - name: Notify success
        if: success()
        run: |
          echo "::notice title=Deploy OK::${{ github.ref_name }} đã deploy lên VPS thành công."

      - name: Notify failure
        if: failure()
        run: |
          echo "::error title=Deploy Failed::Deploy ${{ github.ref_name }} thất bại. Kiểm tra logs bên trên."
